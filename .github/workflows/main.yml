jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x' # Ou uma versão específica como '3.10'
      - name: Install dependencies # Este é o passo crucial!
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt # Ou o nome do seu arquivo, como 'requeriments.txt'
